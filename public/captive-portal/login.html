<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion WiFi - TicketWiFiZone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #123B8B 0%, #0e2a66 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1a1a1a;
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .header {
      background: #123B8B;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 60px;
      height: 60px;
      background: #81B545;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }
    .title {
      color: white;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }
    .content { padding: 24px; }
    .qr-section {
      text-align: center;
      margin-bottom: 24px;
    }
    .qr-placeholder {
      width: 160px;
      height: 160px;
      margin: 0 auto 16px;
      border: 3px dashed #123B8B;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f5ff;
    }
    .qr-placeholder svg {
      width: 60px;
      height: 60px;
      opacity: 0.3;
    }
    .qr-hint {
      color: #666;
      font-size: 13px;
    }
    .cta-button {
      display: block;
      width: 100%;
      background: #81B545;
      color: white;
      text-decoration: none;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
    }
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(129, 181, 69, 0.4);
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    .divider-text {
      padding: 0 16px;
      color: #999;
      font-size: 13px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: #123B8B; }
    .form-input::placeholder { color: #aaa; }
    .login-button {
      width: 100%;
      padding: 16px;
      background: #123B8B;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-button:hover { background: #0e2a66; }
    .error {
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    .footer {
      text-align: center;
      padding: 20px;
      background: #f8f9fa;
    }
    .footer-text {
      color: #666;
      font-size: 12px;
    }
    .operators {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .operator-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .operator-orange { background: #fff3e0; color: #f97316; }
    .operator-moov { background: #e3f2fd; color: #1976d2; }
    .operator-telecel { background: #e8f5e9; color: #43a047; }
    .operator-wave { background: #e0f7fa; color: #00bcd4; }
    .powered-by {
      margin-top: 16px;
      font-size: 11px;
      color: #999;
    }
    .powered-by a {
      color: #123B8B;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 360px) {
      .container { border-radius: 0; }
      .content { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <script>
    // CONFIGURATION À MODIFIER PAR LE PROPRIÉTAIRE
    var ZONE_BUY_URL = "https://ticketswifizone.com/zone/[ZONE_ID]/buy";
    var mikrotikLink = "$(link-login-only)";
    var mikrotikOrig = "$(link-orig)";
    var mikrotikError = "$(error)";
  </script>

  <div class="container">
    <div class="header">
      <div class="logo">📶</div>
      <h1 class="title">Connexion WiFi</h1>
      <p class="subtitle">Connectez-vous ou achetez un ticket</p>
    </div>

    <div class="content">
      <div class="qr-section">
        <div class="qr-placeholder">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 3h6v6H3V3zm2 2v2h2V5H5zm8-2h6v6h-6V3zm2 2v2h2V5h-2zM3 13h6v6H3v-6zm2 2v2h2v-2H5zm13-2h3v2h-3v-2zm-3 0h2v2h-2v-2zm-2 3h2v2h-2v-2zm2 2h2v2h-2v-2zm2 2h3v2h-3v-2zM5 15h2v2H5v-2zm14 2h-2v2h2v-2zm-2-2h-2v2h2v-2zm-2-2h-2v2h2v-2zm2-2h2v2h-2v-2zm2 2h2v2h-2v-2zM13 5h2v2h-2V5zm2 2h2v2h-2V7zM3 21h6v-2H3v2zm8 0h2v-2h-2v2zm2-2h2v2h-2v-2zm2 2h2v-2h-2v2zm2 0h2v-2h-2v2z"/>
          </svg>
        </div>
        <p class="qr-hint">Scannez pour acheter un ticket WiFi</p>
      </div>

      <a href="#" id="buyButton" class="cta-button">
        🛒 Acheter un ticket WiFi
      </a>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Déjà un code ?</span>
        <div class="divider-line"></div>
      </div>

      <div id="errorBox" class="error"></div>

      <form id="loginForm" action="$(link-login-only)" method="post">
        <input type="hidden" name="dst" value="$(link-orig)">
        <input type="hidden" name="popup" value="true">
        <div class="form-group">
          <label class="form-label" for="username">Nom d'utilisateur</label>
          <input type="text" id="username" name="username" class="form-input"
                 placeholder="Ex: ticket_123456" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input type="password" id="password" name="password" class="form-input"
                 placeholder="Votre mot de passe" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-button">Se connecter</button>
      </form>
    </div>

    <div class="footer">
      <p class="footer-text">Paiement Mobile Money accepté</p>
      <div class="operators">
        <span class="operator-badge operator-orange">Orange Money</span>
        <span class="operator-badge operator-moov">Moov Money</span>
        <span class="operator-badge operator-telecel">Telecel Money</span>
        <span class="operator-badge operator-wave">Wave</span>
      </div>
      <p class="powered-by">
        Propulsé par <a href="https://ticketswifizone.com" target="_blank">TicketWiFiZone</a>
      </p>
    </div>
  </div>

  <script>
    (function() {
      var buyButton = document.getElementById('buyButton');
      var errorBox = document.getElementById('errorBox');
      var loginForm = document.getElementById('loginForm');
      var mikrotikError = "$(error)";

      if (buyButton && typeof ZONE_BUY_URL !== 'undefined') {
        buyButton.href = ZONE_BUY_URL;
      }

      if (mikrotikError && mikrotikError !== "$(error)") {
        errorBox.textContent = mikrotikError;
        errorBox.classList.add('show');
      }

      var urlParams = new URLSearchParams(window.location.search);
      var username = urlParams.get('username');
      var password = urlParams.get('password');

      if (username) {
        document.getElementById('username').value = username;
      }
      if (password) {
        document.getElementById('password').value = password;
      }

      if (username && password) {
        loginForm.submit();
      }
    })();
  </script>
</body>
</html>
